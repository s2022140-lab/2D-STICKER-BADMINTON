{% extends 'base.html' %}

{% block content %}
<!-- 載入 Stitch 專屬字型與 Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .cyber-grid {
        background-image: linear-gradient(to right, rgba(0, 219, 233, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(0, 219, 233, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    .scanlines {
        background: linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0) 50%,
            rgba(0, 0, 0, 0.1) 50%
        );
        background-size: 100% 4px;
        pointer-events: none;
    }

    .neon-glow-primary {
        box-shadow: 0 0 15px rgba(0, 219, 233, 0.4);
    }

    .neon-glow-secondary {
        box-shadow: 0 0 15px rgba(254, 0, 254, 0.4);
    }

    .hud-border {
        border: 1px solid rgba(0, 219, 233, 0.2);
        clip-path: polygon(
            0% 10px, 10px 0%, 
            calc(100% - 10px) 0%, 100% 10px, 
            100% calc(100% - 10px), calc(100% - 10px) 100%, 
            10px 100%, 0% calc(100% - 10px)
        );
    }
</style>

<!-- 注入 Stitch 專屬 Tailwind 配色與尺寸規則 -->

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "outline-variant": "#3b494b",
                  "on-tertiary": "#3c0090",
                  "on-secondary-fixed-variant": "#810081",
                  "outline": "#849495",
                  "surface-container-low": "#1c1b1b",
                  "on-tertiary-container": "#7213ff",
                  "surface": "#131313",
                  "inverse-primary": "#006970",
                  "surface-variant": "#353534",
                  "on-secondary-fixed": "#380038",
                  "surface-container-lowest": "#0e0e0e",
                  "on-secondary": "#5b005b",
                  "secondary-container": "#fe00fe",
                  "surface-container-highest": "#353534",
                  "on-primary-fixed-variant": "#004f54",
                  "inverse-on-surface": "#313030",
                  "background": "#131313",
                  "inverse-surface": "#e5e2e1",
                  "surface-bright": "#3a3939",
                  "on-surface-variant": "#b9cacb",
                  "on-primary": "#00363a",
                  "primary-container": "#00f0ff",
                  "tertiary-fixed": "#e9ddff",
                  "surface-dim": "#131313",
                  "error": "#ffb4ab",
                  "on-primary-container": "#006970",
                  "primary-fixed-dim": "#00dbe9",
                  "error-container": "#93000a",
                  "tertiary": "#faf3ff",
                  "surface-container": "#201f1f",
                  "on-tertiary-fixed-variant": "#5700c9",
                  "primary-fixed": "#7df4ff",
                  "on-error-container": "#ffdad6",
                  "on-secondary-container": "#500050",
                  "on-tertiary-fixed": "#23005b",
                  "tertiary-container": "#e1d2ff",
                  "on-surface": "#e5e2e1",
                  "secondary-fixed": "#ffd7f5",
                  "primary": "#dbfcff",
                  "on-primary-fixed": "#002022",
                  "on-background": "#e5e2e1",
                  "secondary-fixed-dim": "#ffabf3",
                  "on-error": "#690005",
                  "tertiary-fixed-dim": "#d1bcff",
                  "surface-tint": "#00dbe9",
                  "surface-container-high": "#2a2a2a",
                  "secondary": "#ffabf3"
          },
          "borderRadius": {
                  "DEFAULT": "0.125rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "0.75rem"
          },
          "spacing": {
                  "unit": "4px",
                  "card-padding": "12px",
                  "safe-margin": "48px",
                  "gutter": "16px",
                  "hud-offset": "32px"
          },
          "fontFamily": {
                  "headline-md": ["Space Grotesk"],
                  "label-caps": ["Space Mono"],
                  "label-sm": ["Geist"],
                  "headline-lg": ["Space Grotesk"],
                  "body-lg": ["Geist"],
                  "display-lg": ["Space Grotesk"],
                  "body-md": ["Geist"]
          },
          "fontSize": {
                  "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                  "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.15em", "fontWeight": "700"}],
                  "label-sm": ["10px", {"lineHeight": "1.0", "fontWeight": "500"}],
                  "headline-lg": ["40px", {"lineHeight": "1.2", "fontWeight": "700"}],
                  "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],

          }
        },
      },
    }
</script>

<!-- 鋼鐵鎖屏頂層容器：完美置中且絕無滾動條 -->
<div class="fixed inset-0 h-screen w-screen overflow-hidden flex flex-col items-center justify-center m-0 p-0 bg-[#000000] z-[9999]">
    
    <!-- 大氣霓虹背景層 -->
    <div class="absolute inset-0 cyber-grid opacity-20 pointer-events-none"></div>
    <div class="absolute inset-0 scanlines pointer-events-none z-50"></div>
    
    <!-- 頂層核心內容 -->
    <main class="w-full max-w-[480px] z-10 flex flex-col gap-8 relative px-4">
        
        <!-- 裝飾背景光源 -->
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-primary/10 blur-[100px] rounded-full pointer-events-none"></div>
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-secondary/10 blur-[100px] rounded-full pointer-events-none"></div>

        <!-- 標題欄區塊 -->
        <div class="flex flex-col items-center gap-2 mb-4">
            <h1 class="font-display-lg text-headline-lg bg-clip-text text-transparent bg-gradient-to-r from-primary-fixed-dim to-secondary-fixed-dim drop-shadow-[0_0_10px_rgba(0,219,233,0.8)] tracking-tighter text-center">
                STICKMAN BADMINTON
            </h1>
            <div class="flex gap-gutter items-center">
                <span class="font-label-caps text-label-caps text-primary/60">V.1.0.0-STABLE</span>
            </div>
        </div>

        <!-- 登入驗證視窗 (Stitch 原生樣式) -->
        <section class="bg-surface-container-lowest/60 backdrop-blur-2xl p-hud-offset rounded-xl border border-outline/20 relative shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="flex flex-col gap-6">
                <!-- 欄位標題 -->
                <div class="flex flex-col gap-1">
                    <h2 class="font-headline-md text-headline-md text-primary drop-shadow-[0_0_8px_rgba(0,219,233,0.3)]">登入系統</h2>
                    <p class="font-label-sm text-label-sm text-on-surface-variant tracking-widest uppercase">Court Access Authentication</p>
                </div>

                <!-- 輸入欄位組 -->
                <div class="flex flex-col gap-4">
                    <div class="flex flex-col gap-2 group">
                        <label class="font-label-caps text-label-caps text-outline group-focus-within:text-primary transition-colors" for="operator-id">ATHLETE ID</label>
                        <div class="relative">
                            <input class="w-full bg-surface-container border-b-2 border-outline-variant focus:border-primary-fixed-dim outline-none py-3 px-2 font-label-caps text-primary placeholder:text-outline-variant/40 transition-all focus:bg-primary/5" id="operator-id" placeholder="PLYR-XXXX-XXXX" type="text" required>
                            <span class="absolute right-2 top-3 material-symbols-outlined text-outline-variant group-focus-within:text-primary">sports_handball</span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-2 group">
                        <label class="font-label-caps text-label-caps text-outline group-focus-within:text-secondary transition-colors" for="encryption-key">PASSCODE</label>
                        <div class="relative">
                            <input class="w-full bg-surface-container border-b-2 border-outline-variant focus:border-secondary-fixed-dim outline-none py-3 px-2 font-label-caps text-secondary placeholder:text-outline-variant/40 transition-all focus:bg-secondary/5" id="encryption-key" placeholder="••••••••••••" type="password">
                            <span class="absolute right-2 top-3 material-symbols-outlined text-outline-variant group-focus-within:text-secondary">stadium</span>
                        </div>
                    </div>
                </div>

                <!-- 點擊觸發按鈕組 -->
                <div class="flex flex-col gap-3 mt-4">
                    <button id="login-btn" class="group relative overflow-hidden bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded transition-all neon-glow-primary active:scale-95 hover:shadow-[0_0_25px_rgba(0,240,255,0.6)] duration-300">
                        <span class="relative z-10 flex items-center justify-center gap-2">進入球場 <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sports_tennis</span></span>
                    </button>
                    <button id="register-btn" class="group relative overflow-hidden border border-secondary-container text-secondary-container font-headline-md text-headline-md py-4 rounded transition-all hover:bg-secondary-container/10 hover:shadow-[0_0_15px_rgba(254,0,254,0.3)] active:scale-95">
                        <span class="relative z-10 flex items-center justify-center gap-2 uppercase">註冊 <span class="material-symbols-outlined">person_add</span></span>
                    </button>
                </div>
            </div>

            <!-- 四角邊框裝飾線 -->
            <div class="absolute -top-px -left-px w-8 h-8 border-t-2 border-l-2 border-primary rounded-tl-xl opacity-60 pointer-events-none"></div>
            <div class="absolute -bottom-px -right-px w-8 h-8 border-b-2 border-r-2 border-secondary rounded-br-xl opacity-60 pointer-events-none"></div>
        </section>
    </main>

    <!-- 邊角 HUD 背景修飾 -->
    <div class="fixed top-hud-offset left-hud-offset z-0">
        <div class="hud-border bg-surface-container/20 p-card-padding"></div>
    </div>
</div>

<!-- 登入邏輯與防斷流跳轉腳本 -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const loginBtn = document.getElementById("login-btn");
        const registerBtn = document.getElementById("register-btn");
        const athleteIdInput = document.getElementById("operator-id");
        const passcodeInput = document.getElementById("encryption-key");

        function authenticateAndNavigate() {
            const rawId = athleteIdInput.value.trim();
            const rawPass = passcodeInput.value.trim();
            
            if (!rawId) {
                window.showCyberToast ? window.showCyberToast("ACCESS DENIED: ATHLETE ID REQUIRED", "error") : alert("ATHLETE ID REQUIRED");
                return;
            }

            // 安全升級：發送 POST 請求到後端 API 進行密碼確認與 Session 簽署
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: rawId, password: rawPass })
            })
            .then(res => {
                if (res.status === 403) {
                    throw new Error("密碼驗證錯誤，拒絕進入終端");
                }
                if (!res.ok) {
                    throw new Error("伺服器安全驗證通訊故障");
                }
                return res.json();
            })
            .then(data => {
                if (data.status === "success") {
                    // 1. 保存至本地快取
                    localStorage.setItem("cyber_badminton_user", rawId);

                    // 2. 透過安全 getCyberUrl 的跳轉規則，維持參數傳遞
                    const destinationUrl = `/lobby?user=${encodeURIComponent(rawId)}`;
                    window.location.href = destinationUrl;
                }
            })
            .catch(err => {
                window.showCyberToast ? window.showCyberToast(`❌ ${err.message}`, "error") : alert(err.message);
            });
        }

        if (loginBtn) {
            loginBtn.addEventListener("click", authenticateAndNavigate);
        }

        if (registerBtn) {
            registerBtn.addEventListener("click", authenticateAndNavigate);
        }

        // 支援 Enter 鍵直接登入
        athleteIdInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                authenticateAndNavigate();
            }
        });
        passcodeInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                authenticateAndNavigate();
            }
        });
    });
</script>
{% endblock %}
